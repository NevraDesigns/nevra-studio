<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haftalık Çalışma Planı</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf8ff;
  --white: #ffffff;
  --border: #ede9f8;
  --border2: #ddd8f0;
  --text: #2d2a42;
  --muted: #a09ab8;
  --muted2: #c4bfd8;

  --uiux:        #9b87f5;
  --uiux-bg:     #f0edff;
  --uiux-border: #d5ccff;
  --uiux-soft:   #e8e3ff;

  --eng:         #52c9a0;
  --eng-bg:      #e8faf4;
  --eng-border:  #b0edd8;
  --eng-soft:    #d4f5e8;

  --de:          #ffaa5c;
  --de-bg:       #fff5e8;
  --de-border:   #ffd4a0;
  --de-soft:     #ffe8cc;

  --sport:       #ff8fa8;
  --sport-bg:    #fff0f4;
  --sport-border:#ffc4d0;
  --sport-soft:  #ffe0e8;

  --free:        #60c4e8;
  --free-bg:     #eef8fd;
  --free-border: #aaddf4;
  --free-soft:   #d0eef9;

  --work:        #b8b4cc;
  --work-bg:     #f5f4f9;
  --work-border: #dddaf0;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* SUMMARY */
.summary-bar {
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.summary-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
}

.summary-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  flex: 1;
}

.summary-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  border: 2px solid transparent;
  white-space: nowrap;
  transition: transform 0.15s;
}
.summary-chip:hover { transform: scale(1.04); }
.summary-chip .sc-emoji { font-size: 15px; }
.summary-chip .sc-time { font-size: 13px; }

.sc-uiux  { background: var(--uiux-bg);  border-color: var(--uiux-border);  color: var(--uiux); }
.sc-eng   { background: var(--eng-bg);   border-color: var(--eng-border);   color: var(--eng); }
.sc-de    { background: var(--de-bg);    border-color: var(--de-border);    color: var(--de); }
.sc-sport { background: var(--sport-bg); border-color: var(--sport-border); color: var(--sport); }

/* HEADER */
.header {
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
}

.logo-badge {
  background: var(--uiux-bg);
  border: 2px solid var(--uiux-border);
  color: var(--uiux);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
  letter-spacing: 0.5px;
}

.legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
}

.legend-pill {
  width: 20px; height: 8px;
  border-radius: 99px;
}

.tip-text {
  font-size: 11px;
  color: var(--muted2);
  font-weight: 500;
  background: var(--bg);
  border: 1.5px dashed var(--border2);
  padding: 4px 10px;
  border-radius: 8px;
}

/* GRID */
.grid-wrapper {
  overflow-x: auto;
  margin: 14px;
  border-radius: 18px;
  border: 2px solid var(--border);
  background: var(--white);
  box-shadow: 0 4px 24px rgba(155,135,245,0.06);
}

.grid {
  display: grid;
  grid-template-columns: 52px repeat(7, 1fr);
  min-width: 860px;
  position: relative;
}

.day-header {
  background: var(--bg);
  padding: 10px 6px;
  text-align: center;
  font-size: 11px;
  font-weight: 800;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-bottom: 2px solid var(--border);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.day-header:last-child { border-right: none; }
.day-header.corner { background: var(--bg); border-right: 1px solid var(--border); }
.day-header .sub { font-size: 10px; font-weight: 700; color: var(--sport); margin-top: 2px; }
.day-header.weekend-col { background: #fdf9ff; }

.time-label {
  background: var(--bg);
  padding: 0 5px;
  font-size: 9px;
  font-weight: 700;
  color: var(--muted2);
  display: flex;
  align-items: flex-start;
  padding-top: 5px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid rgba(237,233,248,0.7);
  user-select: none;
}

.cell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid rgba(237,233,248,0.7);
  background: var(--white);
  min-height: 36px;
  position: relative;
  transition: background 0.1s;
}
.cell:last-child { border-right: none; }
.cell.weekend { background: #fdf9ff; }
.cell.drag-over {
  background: var(--uiux-soft);
  outline: 2px dashed var(--uiux);
  outline-offset: -2px;
}

/* BLOCKS */
.block {
  position: absolute;
  left: 3px; right: 3px;
  border-radius: 10px;
  padding: 5px 8px;
  font-size: 10.5px;
  font-weight: 700;
  cursor: grab;
  z-index: 5;
  overflow: hidden;
  transition: transform 0.12s, box-shadow 0.12s, opacity 0.1s;
  user-select: none;
  border: 2px solid transparent;
}

.block:hover {
  transform: scale(1.025) translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  z-index: 20;
}
.block:active { cursor: grabbing; opacity: 0.75; }
.block.dragging { opacity: 0.25; }

.block .b-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.35; }
.block .b-time  { font-size: 9px; opacity: 0.65; margin-top: 1px; font-weight: 600; }

.block.uiux  { background: var(--uiux-bg);  border-color: var(--uiux-border);  color: var(--uiux); }
.block.eng   { background: var(--eng-bg);   border-color: var(--eng-border);   color: var(--eng); }
.block.de    { background: var(--de-bg);    border-color: var(--de-border);    color: var(--de); }
.block.sport { background: var(--sport-bg); border-color: var(--sport-border); color: var(--sport); }
.block.free  { background: var(--free-bg);  border-color: var(--free-border);  color: var(--free); }
.block.work  { background: var(--work-bg);  border-color: var(--work-border);  color: var(--work); cursor: default; }
.block.work:hover { transform: none; box-shadow: none; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(45,42,66,0.25);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 22px;
  padding: 24px;
  width: 340px;
  box-shadow: 0 24px 60px rgba(155,135,245,0.15);
}
.modal h3 { font-size: 15px; font-weight: 800; margin-bottom: 18px; color: var(--text); }

.form-group { margin-bottom: 12px; }
.form-group label {
  display: block; font-size: 10px; color: var(--muted);
  margin-bottom: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.form-group input,
.form-group select {
  width: 100%; background: var(--bg); border: 2px solid var(--border);
  border-radius: 10px; color: var(--text); padding: 8px 12px;
  font-size: 13px; font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none; transition: border-color 0.15s; font-weight: 500;
}
.form-group input:focus,
.form-group select:focus { border-color: var(--uiux); }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.btn {
  flex: 1; padding: 10px; border-radius: 12px; border: none;
  font-size: 13px; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer; transition: all 0.15s;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--uiux); color: #fff; box-shadow: 0 4px 12px rgba(155,135,245,0.3); }
.btn-ghost   { background: var(--bg); color: var(--muted); border: 2px solid var(--border); }
.btn-danger  { background: var(--sport-bg); color: var(--sport); border: 2px solid var(--sport-border); flex: 0; padding: 10px 14px; }

/* FAB */
.fab {
  position: fixed; bottom: 24px; right: 24px;
  width: 50px; height: 50px; border-radius: 50%;
  background: linear-gradient(135deg, var(--uiux), #c4b5fd);
  border: none; color: #fff; font-size: 24px; cursor: pointer;
  box-shadow: 0 6px 24px rgba(155,135,245,0.4);
  z-index: 50; transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.fab:hover { transform: scale(1.12) rotate(8deg); }

/* Lottie / gif mascot */
.mascot {
  position: fixed;
  bottom: 84px;
  right: 20px;
  width: 56px;
  height: 56px;
  pointer-events: none;
  opacity: 0.85;
  filter: drop-shadow(0 2px 8px rgba(155,135,245,0.3));
  transition: opacity 0.3s;
}
</style>
</head>
<body>

<!-- SUMMARY -->
<div class="summary-bar">
  <div class="summary-title">✨ Bu hafta</div>
  <div class="summary-chips" id="summaryChips"></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    📅 Haftalık Plan
    <span class="logo-badge">2025</span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-pill" style="background:#d5ccff"></div>UI/UX</div>
    <div class="legend-item"><div class="legend-pill" style="background:#b0edd8"></div>İngilizce</div>
    <div class="legend-item"><div class="legend-pill" style="background:#ffd4a0"></div>Almanca</div>

<div class="grid-wrapper">

</div>

<!-- Mascot gif -->
<img
  class="mascot"
  src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcGJ4bHVlMnN4dXp6NHJ6NnZ5ZXBvcXI4ZHJkM2FtMmF0cGsxcjZxcSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3oKIPnAiaMCws8nOsE/giphy.gif"
  alt="motivasyon"
  title="Hadi bakalım! 🚀"
/>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">✏️ Blok Düzenle</h3>
    <div class="form-group">
      <label>Başlık</label>
      <input type="text" id="fTitle">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Gün</label>
        <select id="fDay">
          <option value="0">Pazartesi</option>
          <option value="1">Salı</option>
          <option value="2">Çarşamba</option>
          <option value="3">Perşembe</option>
          <option value="4">Cuma</option>
          <option value="5">Cumartesi</option>
          <option value="6">Pazar</option>
        </select>
      </div>
      <div class="form-group">
        <label>Kategori</label>
        <select id="fType">
          <option value="uiux">🎨 UI/UX</option>
          <option value="eng">🇬🇧 İngilizce</option>
          <option value="de">🇩🇪 Almanca</option>
          <option value="sport">🏋️ Spor</option>
          <option value="free">🎉 Serbest</option>
          <option value="work">💼 İş</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Başlangıç</label>
        <input type="time" id="fStart">
      </div>
      <div class="form-group">
        <label>Bitiş</label>
        <input type="time" id="fEnd">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-danger" id="btnDelete" onclick="deleteBlock()">🗑️</button>
      <button class="btn btn-primary" onclick="saveBlock()">Kaydet ✓</button>
    </div>
  </div>
</div>

<button class="fab" onclick="openAddModal()" title="Yeni blok ekle">＋</button>

<script>
const DAYS     = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];
const DAY_SUB  = ['','💪 Spor','','💪 Spor','','💪 Spor',''];
const START_HOUR = 6, END_HOUR = 23;
const SLOT_H = 36, SLOTS_PER_HOUR = 2;

const CAT = {
  uiux:  { emoji:'🎨', label:'UI/UX',      sc:'sc-uiux'  },
  eng:   { emoji:'🇬🇧', label:'İngilizce',  sc:'sc-eng'   },
  de:    { emoji:'🇩🇪', label:'Almanca',    sc:'sc-de'    },
  sport: { emoji:'🏋️', label:'Spor',       sc:'sc-sport' },
  free:  { emoji:'🎉', label:'Serbest',    sc:null       },
  work:  { emoji:'💼', label:'İş',         sc:null       },
};

let blocks = [
  ...([0,1,2,3,4].map(d=>({id:`work-${d}`,     day:d,start:'08:00',end:'18:00',title:'💼 İş',type:'work'}))),
  ...([0,1,2,3,4].map(d=>({id:`eng-morn-${d}`, day:d,start:'06:45',end:'07:00',title:'🇬🇧 İng Kitap',type:'eng'}))),
  {id:'uiux-mon', day:0,start:'19:00',end:'20:30',title:'🎨 UI/UX — Figma + Teori',       type:'uiux'},
  {id:'de-mon',   day:0,start:'20:30',end:'21:00',title:'🇩🇪 Almanca Tekrar',              type:'de'},
  {id:'sport-tue',day:1,start:'19:00',end:'20:45',title:'🏋️ Spor',                        type:'sport'},
  {id:'eng-tue',  day:1,start:'20:45',end:'21:30',title:'🇬🇧 İng Kurs (Rupert Walsh)',     type:'eng'},
  {id:'uiux-wed', day:2,start:'19:00',end:'20:30',title:'🎨 UI/UX — Proje Pratiği',       type:'uiux'},
  {id:'de-wed',   day:2,start:'20:30',end:'21:00',title:'🇩🇪 Almanca',                     type:'de'},
  {id:'sport-thu',day:3,start:'19:00',end:'20:45',title:'🏋️ Spor',                        type:'sport'},
  {id:'eng-thu',  day:3,start:'20:45',end:'21:30',title:'🇬🇧 İng Kurs (Rupert Walsh)',     type:'eng'},
  {id:'uiux-fri', day:4,start:'19:00',end:'20:00',title:'🎨 UI/UX — Hafta Değerlendirme', type:'uiux'},
  {id:'free-fri', day:4,start:'20:00',end:'21:30',title:'🎉 Serbest / Sosyal',             type:'free'},
  {id:'sport-sat',day:5,start:'09:30',end:'11:15',title:'🏋️ Spor',                        type:'sport'},
  {id:'uiux-sat', day:5,start:'11:30',end:'13:30',title:'🎨 UI/UX — Derin Çalışma',       type:'uiux'},
  {id:'eng-sat',  day:5,start:'14:00',end:'15:00',title:'🇬🇧 İng Kurs + Murphy Tekrar',   type:'eng'},
  {id:'de-sat',   day:5,start:'15:00',end:'16:00',title:'🇩🇪 Almanca Haftalık Tekrar',    type:'de'},
  {id:'free-sat', day:5,start:'17:00',end:'22:00',title:'🎉 Sosyal / Serbest',             type:'free'},
  {id:'uiux-sun', day:6,start:'10:00',end:'11:30',title:'🎨 UI/UX — Case Study',           type:'uiux'},
  {id:'de-sun',   day:6,start:'11:30',end:'12:00',title:'🇩🇪 Almanca',                     type:'de'},
  {id:'free-sun', day:6,start:'13:00',end:'22:00',title:'🎉 Dinlenme / Serbest',            type:'free'},
];

let editingId=null, dragBlock=null, dragOffsetSlot=0;

const toMins = t => { const[h,m]=t.split(':').map(Number); return h*60+m; };
const toSlot = t => { const[h,m]=t.split(':').map(Number); return (h-START_HOUR)*2+(m>=30?1:0); };
const fromSlot = s => { const tot=START_HOUR*60+s*30; return `${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`; };
const slotCount = () => (END_HOUR-START_HOUR)*2;
const durMins = b => toMins(b.end)-toMins(b.start);
const fmtDur = m => { const h=Math.floor(m/60),r=m%60; return h&&r?`${h}sa ${r}dk`:h?`${h} saat`:`${r} dk`; };

function updateSummary() {
  const totals={};
  blocks.forEach(b=>{ if(['work','free'].includes(b.type))return; totals[b.type]=(totals[b.type]||0)+durMins(b); });
  const c=document.getElementById('summaryChips');
  c.innerHTML='';
  ['uiux','eng','de','sport'].forEach(type=>{
    if(!totals[type])return;
    const m=CAT[type];
    const el=document.createElement('div');
    el.className=`summary-chip ${m.sc}`;
    el.innerHTML=`<span class="sc-emoji">${m.emoji}</span> ${m.label} <span class="sc-time">${fmtDur(totals[type])}</span>`;
    c.appendChild(el);
  });
}

function buildGrid() {
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const total=slotCount();

  const corner=document.createElement('div');
  corner.className='day-header corner';
  grid.appendChild(corner);

  DAYS.forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='day-header'+(i>=5?' weekend-col':'');
    h.innerHTML=`${d}${DAY_SUB[i]?`<div class="sub">${DAY_SUB[i]}</div>`:''}`;
    grid.appendChild(h);
  });

  for(let s=0;s<total;s++){
    const lbl=document.createElement('div');
    lbl.className='time-label';
    if(s%2===0) lbl.textContent=fromSlot(s);
    grid.appendChild(lbl);
    for(let d=0;d<7;d++){
      const cell=document.createElement('div');
      cell.className='cell'+(d>=5?' weekend':'');
      cell.dataset.day=d; cell.dataset.slot=s;
      cell.addEventListener('dragover',onDragOver);
      cell.addEventListener('dragleave',onDragLeave);
      cell.addEventListener('drop',onDrop);
      grid.appendChild(cell);
    }
  }
  blocks.forEach(renderBlock);
  updateSummary();
}

function renderBlock(b) {
  const old=document.getElementById('b-'+b.id);
  if(old)old.remove();
  const ss=toSlot(b.start), es=toSlot(b.end), span=Math.max(1,es-ss);
  const cell=document.querySelector(`.cell[data-day="${b.day}"][data-slot="${ss}"]`);
  if(!cell)return;
  const el=document.createElement('div');
  el.id='b-'+b.id;
  el.className=`block ${b.type}`;
  el.draggable=b.type!=='work';
  el.style.top='2px';
  el.style.height=(span*SLOT_H-4)+'px';
  el.innerHTML=`<div class="b-title">${b.title}</div><div class="b-time">${b.start}–${b.end}</div>`;
  el.addEventListener('dblclick',()=>openEditModal(b.id));
  el.addEventListener('dragstart',e=>{
    if(b.type==='work')return;
    dragBlock=b;
    dragOffsetSlot=Math.floor((e.clientY-el.getBoundingClientRect().top)/SLOT_H);
    setTimeout(()=>el.classList.add('dragging'),0);
    e.dataTransfer.effectAllowed='move';
  });
  el.addEventListener('dragend',()=>{ el.classList.remove('dragging'); dragBlock=null; });
  cell.appendChild(el);
}

function onDragOver(e){ e.preventDefault(); this.classList.add('drag-over'); }
function onDragLeave(){ this.classList.remove('drag-over'); }
function onDrop(e){
  e.preventDefault(); this.classList.remove('drag-over');
  if(!dragBlock)return;
  const newDay=parseInt(this.dataset.day);
  const ns=Math.max(0,parseInt(this.dataset.slot)-dragOffsetSlot);
  const dur=toSlot(dragBlock.end)-toSlot(dragBlock.start);
  if(ns+dur>slotCount())return;
  dragBlock.day=newDay; dragBlock.start=fromSlot(ns); dragBlock.end=fromSlot(ns+dur);
  renderBlock(dragBlock); updateSummary();
}

function openEditModal(id){
  const b=blocks.find(x=>x.id===id); if(!b)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='✏️ Blok Düzenle';
  document.getElementById('fTitle').value=b.title;
  document.getElementById('fDay').value=b.day;
  document.getElementById('fType').value=b.type;
  document.getElementById('fStart').value=b.start;
  document.getElementById('fEnd').value=b.end;
  document.getElementById('btnDelete').style.display='block';
  document.getElementById('modalOverlay').classList.add('open');
}

function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='✨ Yeni Blok Ekle';
  document.getElementById('fTitle').value='';
  document.getElementById('fDay').value=0;
  document.getElementById('fType').value='uiux';
  document.getElementById('fStart').value='09:00';
  document.getElementById('fEnd').value='10:00';
  document.getElementById('btnDelete').style.display='none';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

function saveBlock(){
  const title=document.getElementById('fTitle').value.trim();
  const day=parseInt(document.getElementById('fDay').value);
  const type=document.getElementById('fType').value;
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  if(!title||!start||!end)return;
  if(editingId){ const b=blocks.find(x=>x.id===editingId); Object.assign(b,{title,day,type,start,end}); renderBlock(b); }
  else{ const nb={id:'c-'+Date.now(),title,day,type,start,end}; blocks.push(nb); renderBlock(nb); }
  updateSummary(); closeModal();
}

function deleteBlock(){
  if(!editingId)return;
  blocks=blocks.filter(x=>x.id!==editingId);
  const el=document.getElementById('b-'+editingId); if(el)el.remove();
  updateSummary(); closeModal();
}

document.getElementById('modalOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modalOverlay'))closeModal(); });

buildGrid();
</script>
</body>
</html>
